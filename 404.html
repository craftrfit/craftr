<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found — Craftr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-dasharray='57 24'/><circle cx='16' cy='16' r='2' fill='white'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist', 'Inter', system-ui, sans-serif;
      background: #0A0A0A;
      color: #F7F7F7;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      text-align: center;
      max-width: 420px;
      opacity: 0;
      transform: translateY(12px);
      animation: appear 500ms cubic-bezier(0.25,0.1,0.25,1) 80ms forwards;
    }
    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }
    .mark { margin: 0 auto 40px; opacity: 0.4; }
    .code {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #52525B;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 0.96;
      margin-bottom: 20px;
    }
    p {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.65;
      color: #A1A1AA;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      width: 48px;
      margin: 44px auto;
    }
    a {
      font-size: 14px;
      font-weight: 500;
      color: #52525B;
      text-decoration: none;
      transition: color 150ms ease;
    }
    a:hover { color: #F7F7F7; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="mark" width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="16" cy="16" r="13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="57 24"/>
      <circle cx="16" cy="16" r="2" fill="white"/>
    </svg>
    <p class="code">404</p>
    <h1>Nothing here.</h1>
    <p>This page doesn't exist — or it moved.</p>
    <hr class="divider">
    <a href="/">← Back to Craftr</a>
  </div>
</body>
</html>
