<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craftr — Coming Soon</title>
  <meta name="description" content="Craftr is in development. A performance self-tracking app for habits, workouts, and discipline.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0A;
      --bg-card: #111111;
      --bg-card-hover: #161616;
      --bg-surface: #1A1A1A;
      --text-primary: #F7F7F7;
      --text-secondary: #A1A1AA;
      --text-muted: #52525B;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.12);
      --accent: #FFFFFF;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Geist', Inter, 'SF Pro Display', system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fade-in 600ms ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      .content {
        animation: none;
      }
    }

    .logo {
      width: 40px;
      height: 40px;
      opacity: 0.6;
      color: var(--accent);
    }

    .heading {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-top: 32px;
    }

    .body-text {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary);
      max-width: 480px;
      text-align: center;
      margin-top: 20px;
    }

    .back-link {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 40px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    :focus-visible {
      outline: 2px solid rgba(255,255,255,0.6);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="content">
    <svg class="logo" viewBox="0 0 32 32" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <path d="M 23.124 5.072 A 14 14 0 1 0 23.124 26.928" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="23" y="15" width="6" height="2" fill="currentColor" rx="1"/>
    </svg>
    <h1 class="heading">Something worth waiting for.</h1>
    <p class="body-text">Craftr is in its final stage of development. We're taking time to get it right.</p>
    <a href="index.html" class="back-link">&larr; Back to Craftr</a>
  </main>
</body>
</html>
