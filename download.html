<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craftr — Build the discipline you've always wanted.</title>
  <meta name="description" content="Craftr is a performance self-tracking app for habits, workouts, and daily discipline. Built for people who show up every day.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="canonical" href="https://craftr.app/download">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Craftr — Build the discipline you've always wanted.">
  <meta property="og:description" content="Track habits, log workouts, measure your daily discipline. Craftr is a performance self-tracking app built for people who take self-improvement seriously.">
  <meta property="og:url" content="https://craftr.app/download">
  <meta property="og:image" content="https://craftr.app/og.png">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Craftr — Build the discipline you've always wanted.">
  <meta name="twitter:description" content="Track habits, log workouts, measure your daily discipline.">
  <!-- Favicon SVG data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-dasharray='57 24'/%3E%3Ccircle cx='16' cy='16' r='2' fill='white'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-dasharray='57 24'/%3E%3Ccircle cx='16' cy='16' r='2' fill='white'/%3E%3C/svg%3E">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { 
      font-family: 'Geist', 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img, svg { display: block; max-width: 100%; }
    button { font-family: inherit; }
    a { color: inherit; }

    /* ─── Tokens ─── */
    :root {
      --bg: #0A0A0A;
      --bg-card: #111111;
      --bg-card-hover: #161616;
      --bg-surface: #141414;
      --bg-deep: #0D0D0D;
      --text-primary: #F7F7F7;
      --text-secondary: #A1A1AA;
      --text-muted: #7C7C84; /* Increased contrast to pass WCAG AA (>4.5:1 on #0A0A0A) */
      --text-faint: #4E4E54; /* Increased contrast for faints as well */
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --border-focus: rgba(255,255,255,0.5);
      --accent: #FFFFFF;
      --ease-apple: cubic-bezier(0.25, 0.1, 0.25, 1.0);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      background: var(--bg);
      padding: 48px 24px;
    }

    /* ─── Focus Styles ─── */
    :focus-visible {
      outline: 2px solid rgba(255,255,255,0.55);
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* ─── Content Card ─── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms var(--ease-apple), transform 500ms var(--ease-apple);
      transition-delay: 80ms;
    }

    .loaded .content {
      opacity: 1;
      transform: translateY(0);
    }

    .logo-container {
      width: 44px;
      height: 44px;
      color: var(--text-primary);
      opacity: 0.45;
      margin-bottom: 40px;
    }

    .heading {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: -0.028em;
      line-height: 0.96;
      color: var(--text-primary);
    }

    .body-text {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-top: 20px;
    }

    .rule {
      border: none;
      border-top: 1px solid var(--border);
      width: 40px;
      margin: 44px auto;
    }

    .back-link {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 150ms var(--ease-apple);
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    /* ─── Reduced Motion ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .content {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="content">
    <div class="logo-container">
      <svg viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
        <path d="M 16 3 A 13 13 0 1 0 27.26 9.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="21.5" y="1.74" width="2" height="6" fill="currentColor" transform="rotate(30 22.5 4.74)"/>
        <circle cx="16" cy="16" r="2" fill="currentColor"/>
      </svg>
    </div>
    <h1 class="heading">Something worth<br>waiting for.</h1>
    <p class="body-text">
      Craftr is in its final stage of development.<br>
      We're taking the time to get it right.
    </p>
    <hr class="rule">
    <a href="index.html" class="back-link">&larr; Back to Craftr</a>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.classList.add('loaded');
    });
  </script>
</body>
</html>
